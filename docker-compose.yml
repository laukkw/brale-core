name: ${COMPOSE_PROJECT_NAME:-brale-core}

services:
  timescaledb:
    build:
      context: .
      dockerfile: Dockerfile.timescaledb
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brale}
      POSTGRES_DB: ${POSTGRES_DB:-brale}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - type: bind
        source: ${PGDATA_ROOT:-./data/pgdata}
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brale}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  freqtrade:
    build:
      context: .
      dockerfile: Dockerfile.freqtrade
      args:
        # 将宿主机环境变量穿透进 Dockerfile
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    restart: unless-stopped
    env_file:
      - path: ${STACK_PROXY_ENV_FILE:-./data/freqtrade/proxy.env}
        required: false
    environment:
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,brale,freqtrade}
    command:
      - "trade"
      - "--logfile"
      - "/freqtrade/user_data/logs/freqtrade.log"
      - "--db-url"
      - "sqlite:////freqtrade/user_data/tradesv3.sqlite"
      - "--config"
      - "/freqtrade/user_data/config.json"
      - "--strategy"
      - "BraleSharedStrategy"
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    volumes:
      - type: bind
        source: ${FREQTRADE_RUNTIME_ROOT:-./data/freqtrade/user_data}
        target: /freqtrade/user_data

  brale:
    build:
      context: .
      dockerfile: Dockerfile
      target: brale-runtime
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
      - path: ${STACK_PROXY_ENV_FILE:-./data/freqtrade/proxy.env}
        required: false
    environment:
      TZ: Asia/Shanghai
      DATABASE_DSN: "postgres://${POSTGRES_USER:-brale}:${POSTGRES_PASSWORD:-brale}@timescaledb:5432/${POSTGRES_DB:-brale}?sslmode=disable"
    command:
      - "-system"
      - "/app/configs/system.toml"
      - "-symbols"
      - "/app/configs/symbols-index.toml"
    depends_on:
      freqtrade:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:9991:9991"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9991/healthz"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    volumes:
      - type: bind
        source: ${BRALE_CONFIG_ROOT:-./configs}
        target: /app/configs
        read_only: true
      - type: bind
        source: ${BRALE_DATA_ROOT:-./data/brale}
        target: /app/data

  mcp-sse:
    profiles: ["mcp"]
    build:
      context: .
      dockerfile: Dockerfile
      target: brale-runtime
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    entrypoint: ["bralectl"]
    command:
      - "--endpoint"
      - "http://brale:9991"
      - "mcp"
      - "serve"
      - "--mode"
      - "sse"
      - "--addr"
      - "0.0.0.0:8765"
      - "--system"
      - "/app/configs/system.toml"
      - "--index"
      - "/app/configs/symbols-index.toml"
      - "--audit-log"
      - "/app/data/mcp-audit.jsonl"
    depends_on:
      brale:
        condition: service_healthy
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - type: bind
        source: ${BRALE_CONFIG_ROOT:-./configs}
        target: /app/configs
        read_only: true
      - type: bind
        source: ${BRALE_DATA_ROOT:-./data/brale}
        target: /app/data
    restart: unless-stopped
