name: ${COMPOSE_PROJECT_NAME:-brale-core}

services:
  onboarding:
    build:
      context: .
      dockerfile: Dockerfile
      target: onboarding-runtime
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    restart: unless-stopped
    working_dir: ${HOST_REPO_ROOT:-/workspace}
    environment:
      HOST_REPO_ROOT: ${HOST_REPO_ROOT:-/workspace}
      HOST_UID: ${HOST_UID:-1000}
      HOST_GID: ${HOST_GID:-1000}
      TZ: Asia/Shanghai
    command:
      - "serve"
      - "-addr"
      - "0.0.0.0:9992"
      - "-repo"
      - ${HOST_REPO_ROOT:-/workspace}
      - "-allow-non-loopback"
    ports:
      - "127.0.0.1:9992:9992"
    volumes:
      - type: bind
        source: .
        target: ${HOST_REPO_ROOT:-/workspace}
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9992/api/status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  freqtrade:
    build:
      context: .
      dockerfile: Dockerfile.freqtrade
      args:
        # 将宿主机环境变量穿透进 Dockerfile
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - path: ${STACK_PROXY_ENV_FILE:-./data/freqtrade/proxy.env}
        required: false
    environment:
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,brale,freqtrade}
    command:
      - "trade"
      - "--logfile"
      - "/freqtrade/user_data/logs/freqtrade.log"
      - "--db-url"
      - "sqlite:////freqtrade/user_data/tradesv3.sqlite"
      - "--config"
      - "/freqtrade/user_data/config.json"
      - "--strategy"
      - "BraleSharedStrategy"
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    volumes:
      - type: bind
        source: ${FREQTRADE_RUNTIME_ROOT:-./data/freqtrade/user_data}
        target: /freqtrade/user_data

  brale:
    build:
      context: .
      dockerfile: Dockerfile
      target: brale-runtime
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
      - path: ${STACK_PROXY_ENV_FILE:-./data/freqtrade/proxy.env}
        required: false
    environment:
      TZ: Asia/Shanghai
    command:
      - "-system"
      - "/app/configs/system.toml"
      - "-symbols"
      - "/app/configs/symbols-index.toml"
    depends_on:
      freqtrade:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:9991:9991"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9991/healthz"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    volumes:
      - type: bind
        source: ${BRALE_CONFIG_ROOT:-./configs}
        target: /app/configs
        read_only: true
      - type: bind
        source: ${BRALE_DATA_ROOT:-./data/brale}
        target: /app/data
