# ETHUSDT symbol configuration
# Each actively traded symbol requires its own config file.

# Symbol identifier (must match the exchange/market data source exactly).
symbol = "ETHUSDT"
# Candlestick intervals to collect. Order affects display only, not logic.
intervals = ["15m","1h","4h"]
# Number of candles to fetch per interval. Higher = slower but better structure detection.
kline_limit = 300

[agent]
# Enable indicator Agent (outputs technical indicator summary).
indicator = true
# Enable structure Agent (outputs market structure / pattern summary).
structure = true
# Enable mechanics Agent (outputs derivatives / sentiment summary).
mechanics = true

[require]
# Data requirements — if a required field is missing, this symbol skips the round.
oi = true
funding = true
long_short = true
fear_greed = true
# Liquidation data is optional; disable if your strategy does not depend on it.
liquidations = false

[indicators]
# engine: primary indicator computation backend.
#   "talib" (default) — uses go-talib for all indicators.
#   "reference" — uses the pure-Go cinar/indicator library.
engine = "talib"

# shadow_engine: optional second engine that runs in parallel for cross-validation.
# Results are logged but never affect trading decisions.
# Set to "reference" to verify talib output, or leave empty to disable.
# Use 'bralectl indicator diff' to compare the two engines offline.
shadow_engine = "reference"

# EMA periods: fast/mid/slow used for trend and crossover features.
ema_fast = 21
ema_mid = 50
ema_slow = 200

# RSI period (Relative Strength Index — momentum oscillator 0–100).
rsi_period = 14
# ATR period (Average True Range — volatility, also used for stop-loss distance).
atr_period = 14

# STC periods (Schaff Trend Cycle — combines MACD + stochastic smoothing).
stc_fast = 23
stc_slow = 50

# Bollinger Bands: period and standard deviation multiplier.
bb_period = 20
bb_multiplier = 2.0

# CHOP period (Choppiness Index — 0–100, high = ranging, low = trending).
chop_period = 14
# Stochastic RSI period.
stoch_rsi_period = 14
# Aroon period (trend strength indicator).
aroon_period = 25

# last_n: how many recent candles of indicator data to include in LLM context.
last_n = 5
# pretty: format indicator JSON output (increases token usage, useful for debugging).
pretty = false

# memory: three-layer memory system that feeds past experience into LLM prompts.
# Working memory = recent decision context (always active when enabled).
# Episodic memory = structured reflections on closed trades (requires reflector LLM call).
# Semantic memory = persistent trading rules extracted from experience.
[memory]
# Master toggle. When false, no memory context is injected into prompts.
enabled = true
# Number of recent decision summaries kept in working memory.
working_memory_size = 5
# Enable episodic memory (trade reflections stored on position close).
episodic_enabled = true
# Auto-expire episodic records older than this many days.
episodic_ttl_days = 90
# Maximum episodic entries per symbol (oldest pruned first).
episodic_max_per_symbol = 3
# Enable semantic memory (long-term trading rules).
# Rules are managed via 'bralectl memory add-rule' and injected into system prompts.
semantic_enabled = true
# Maximum semantic rules per symbol.
semantic_max_rules = 10

# consensus: multi-Agent agreement thresholds for generating a directional signal.
[consensus]
# score_threshold: minimum absolute consensus score for a directional signal.
# Prevents opening positions on weak or ambiguous signals.
score_threshold = 0.5
# confidence_threshold: minimum confidence for a directional signal.
# confidence = coverage * agreement (with C^1.5 penalty). 0.52 balances opportunity vs noise.
confidence_threshold = 0.52

# cooldown: throttle / debounce to prevent rapid repeated entries.
[cooldown]
# Enable cooldown control.
enabled = false
# Minimum seconds between two entries.
entry_cooldown_sec = 120

# llm: model and temperature for each Agent / Provider role.
[llm.agent.indicator]
# Model routing name, typically "provider/model".
model = '${LLM_MODEL_INDICATOR}'
# Sampling temperature — lower = more deterministic, higher = more creative.
temperature = 0.2

[llm.agent.structure]
model = '${LLM_MODEL_STRUCTURE}'
temperature = 0.2

[llm.agent.mechanics]
model = '${LLM_MODEL_MECHANICS}'
temperature = 0.2

[llm.provider.indicator]
model = '${LLM_MODEL_INDICATOR}'
temperature = 0.2

[llm.provider.structure]
model = '${LLM_MODEL_STRUCTURE}'
temperature = 0.2

[llm.provider.mechanics]
model = '${LLM_MODEL_MECHANICS}'
temperature = 0.2
