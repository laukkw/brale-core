# 日志格式：text / json
log_format = "text"
# 日志级别：debug / info / warn / error
log_level = "info"
# 日志输出路径（容器内路径）
log_path = "./data/brale-core.log"
# 执行系统类型（当前仅支持 freqtrade）
execution_system = "freqtrade"
# Freqtrade API 地址（Docker 容器间通信使用服务名）
exec_endpoint = "http://freqtrade:8080/api/v1"
# Freqtrade API 认证用户名（从 .env 注入）
exec_api_key = "${EXEC_USERNAME}"
# Freqtrade API 认证密码（从 .env 注入）
exec_api_secret = "${EXEC_SECRET}"
# 认证方式：basic / bearer
exec_auth = "basic"
# 定时决策总开关
enable_scheduled_decision = true

# LLM 调用最小间隔（防止高频调用超限）
llm_min_interval = "5s"

# LLM 轮次预算与记录器配置（可选）
# [llm]
# # 每轮决策的总 Token 预算（所有 Agent / Provider 调用合计），0 = 不限制
# # 超预算时仅打印 Warning 日志，不会中断已经配置好的后续 LLM 阶段
# token_budget_per_round = 0
# # 预算预警阈值（百分比）。达到 budget * warn_pct / 100 时单轮告警一次；0 = 不设置
# # 该预警同样只打印 Warning 日志，不改变 round outcome
# token_budget_warn_pct = 0
# # 持久化 LLM round 记录时的超时秒数；显式 0 仍回退到内置默认 5s
# round_recorder_timeout_sec = 5
# # LLM round 持久化失败后的重试次数；留空使用默认 1，设为 0 表示不重试
# round_recorder_retries = 1

# 数据库配置 — PostgreSQL / TimescaleDB
[database]
# 连接字符串（Docker 环境由 DATABASE_DSN 环境变量覆盖）
dsn = "${DATABASE_DSN}"
# 最大打开连接数
max_open_conns = 20
# 最大空闲连接数
max_idle_conns = 5

# 可观测性配置 — OpenTelemetry
[telemetry]
# 总开关（false 时所有 trace/metric 为 no-op）
enabled = false
# 导出协议：otlp
exporter = "otlp"
# OTLP Collector 地址
endpoint = "localhost:4317"
# 服务名称标识
service_name = "brale-core"

# 调度后端配置
[scheduler]
# 调度引擎：builtin（进程内 Ticker）/ river（PostgreSQL 异步作业）
backend = "river"

# 对账恢复配置（可选）
# [reconcile]
# # 平仓提交后仍未收敛为 closed 时，允许恢复的等待时长
# # 格式：Go duration，例如 "10m"、"5m"、"30s"
# close_recover_after = "10m"

# Brale 侧单仓最大浮亏强平保护（可选）
# [risk_guard]
# # 单仓 entry→mark 最大浮亏百分数（0 = 禁用）。30 表示 30%，不是 0.30。
# # 这是 Brale 进程侧补充保护；FreqTrade 策略中的 stoploss = -0.30 是独立硬兜底。
# max_drawdown_pct = 0

# LLM 模型配置 — 每个 Agent 车道独立配置端点、密钥和并发
[llm_models.'${LLM_MODEL_INDICATOR}']
# OpenAI 兼容 API 端点
endpoint = "${LLM_INDICATOR_ENDPOINT}"
# API 密钥（从 .env 注入）
api_key = "${LLM_INDICATOR_API_KEY}"
# 是否启用结构化输出（JSON Schema 约束）
structured_output = true
# 单次请求超时（秒）
timeout_sec = 300
# 该模型的最大并发请求数
concurrency = 1

[llm_models.'${LLM_MODEL_STRUCTURE}']
endpoint = "${LLM_STRUCTURE_ENDPOINT}"
api_key = "${LLM_STRUCTURE_API_KEY}"
structured_output = true
timeout_sec = 300
concurrency = 1

[llm_models.'${LLM_MODEL_MECHANICS}']
endpoint = "${LLM_MECHANICS_ENDPOINT}"
api_key = "${LLM_MECHANICS_API_KEY}"
structured_output = true
timeout_sec = 300
concurrency = 1

# Webhook 与运行时 API 配置
[webhook]
# 总开关
enabled = true
# 监听地址（:9991 = 0.0.0.0:9991）
addr = ":9991"
# 事件队列大小
queue_size = 1024
# 消费 worker 数量
worker_count = 4
# 兜底订单轮询间隔（秒）— 当 webhook 回调缺失时触发
fallback_order_poll_sec = 120
# 兜底对账间隔（秒）
fallback_reconcile_sec = 300

# 通知配置
[notification]
# 通知总开关
enabled = ${NOTIFICATION_ENABLED}
# 启动通知开关
startup_notify_enabled = ${NOTIFICATION_STARTUP_NOTIFY_ENABLED}

# Telegram 通知渠道
[notification.telegram]
enabled = ${NOTIFICATION_TELEGRAM_ENABLED}
token = "${NOTIFICATION_TELEGRAM_TOKEN}"
chat_id = ${NOTIFICATION_TELEGRAM_CHAT_ID}

# 飞书通知渠道
[notification.feishu]
enabled = ${NOTIFICATION_FEISHU_ENABLED}
app_id = "${NOTIFICATION_FEISHU_APP_ID}"
app_secret = "${NOTIFICATION_FEISHU_APP_SECRET}"
bot_enabled = ${NOTIFICATION_FEISHU_BOT_ENABLED}
bot_mode = "${NOTIFICATION_FEISHU_BOT_MODE}"
verification_token = "${NOTIFICATION_FEISHU_VERIFICATION_TOKEN}"
encrypt_key = "${NOTIFICATION_FEISHU_ENCRYPT_KEY}"
default_receive_id_type = "${NOTIFICATION_FEISHU_DEFAULT_RECEIVE_ID_TYPE}"
default_receive_id = "${NOTIFICATION_FEISHU_DEFAULT_RECEIVE_ID}"
