version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "internal/pgstore/sql/schema.sql"
    queries:
      - "internal/pgstore/sql/query"
    gen:
      go:
        package: "queries"
        out: "internal/pgstore/queries"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_db_tags: true
