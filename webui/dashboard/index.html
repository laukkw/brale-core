<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brale Dashboard - Break A Leg</title>
  <link rel="icon" type="image/svg+xml" href="./favicon-mask.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="dashboard-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="hero-kicker">策略执行与风控总览</p>
        <h1 id="hero-title" data-text="Brale Dashboard - Break A Leg">Brale Dashboard - Break A Leg</h1>
      </div>
      <div class="hero-meta">
        <div class="chip"><span class="dot" aria-hidden="true"></span> 系统状态: <span id="runtime-status" role="status" aria-live="polite" aria-atomic="true">检查中...</span></div>
        <div class="chip" id="clock-chip">--:--:--</div>
        <a class="chip link-chip" id="decision-view-link" href="/decision-view/" target="_blank" rel="noopener noreferrer">打开决策视图</a>
      </div>
    </header>

    <section class="grid top-grid" aria-label="仓位与盈亏概览">
      <article class="panel" id="live-position-panel">
        <div class="panel-head">
          <h2>实时仓位</h2>
          <span class="subtle">按交易对查看止盈止损与盈亏</span>
        </div>
        <div class="live-position-list" id="live-position-list"></div>
      </article>

      <article class="panel" aria-label="盈亏统计">
        <div class="panel-head">
          <h2>账户与收益</h2>
          <span class="subtle">账户余额与累计收益概览</span>
        </div>
        <div class="pnl-stack">
          <div class="pnl-card">
            <span>账户余额</span>
            <strong id="acct-total">--</strong>
          </div>
          <div class="pnl-card">
            <span>可用金额</span>
            <strong id="acct-free">--</strong>
          </div>
          <div class="pnl-card">
            <span>占用金额</span>
            <strong id="acct-used">--</strong>
          </div>
          <div class="pnl-card">
            <span>监控币种</span>
            <strong id="acct-symbols">--</strong>
          </div>
          <div class="pnl-card">
            <span>已平仓收益</span>
            <strong id="acct-profit-closed">--</strong>
          </div>
          <div class="pnl-card">
            <span>综合收益</span>
            <strong id="acct-profit-all">--</strong>
          </div>
        </div>
      </article>
    </section>

    <section class="grid kline-grid" aria-label="K线与关键交易点位">
      <article class="panel kline-panel full-span">
        <div class="panel-head">
          <h2>K 线走势与关键交易点位</h2>
          <div class="kline-controls">
            <label for="symbol-select" class="subtle">交易对</label>
            <select id="symbol-select"></select>
            <label for="interval-select" class="subtle">周期</label>
            <select id="interval-select"></select>
          </div>
        </div>
        <div id="kline-chart" class="chart"></div>
        <div id="kline-price-tags" class="kline-price-tags" aria-label="价格标签"></div>
      </article>
    </section>

    <section class="grid flow-grid" aria-label="AI 决策关联链路">
      <article class="panel flow-panel full-span">
        <div class="panel-head">
          <h2>AI 决策关联链路</h2>
          <span class="subtle">展示当前交易对最近一次决策链路</span>
        </div>
        <div id="flow-graph" class="flow-graph"></div>
        <div id="flow-meta" class="flow-meta" role="status" aria-live="polite" hidden></div>
      </article>
    </section>

    <section class="grid bottom-grid" aria-label="历史仓位与历史决策">
      <article class="panel">
        <div class="panel-head">
          <h2>历史仓位</h2>
          <span class="subtle">最近已平仓记录</span>
        </div>
        <div class="table-wrap position-history-wrap">
          <table>
            <caption class="sr-only">历史仓位列表</caption>
            <thead>
              <tr>
                <th scope="col">交易对</th>
                <th scope="col">时间</th>
                <th scope="col">方向</th>
                <th scope="col">仓位</th>
                <th scope="col">结果</th>
              </tr>
            </thead>
            <tbody id="position-history-body"></tbody>
          </table>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>历史决策与详情</h2>
          <span class="subtle">点击任意一行查看该次决策详情</span>
        </div>
        <div class="table-wrap decision-wrap">
          <table>
            <caption class="sr-only">历史决策列表</caption>
            <thead>
              <tr>
                <th scope="col">时间</th>
                <th scope="col">动作</th>
                <th scope="col">原因</th>
                <th scope="col">共识总分</th>
                <th scope="col">置信度</th>
                <th scope="col">快照ID</th>
              </tr>
            </thead>
            <tbody id="decision-history-body"></tbody>
          </table>
        </div>
        <div class="decision-history-footer">
          <button
            type="button"
            class="decision-report-toggle ghost decision-history-more"
            id="decision-history-more"
            hidden
          >
            加载更多历史决策
          </button>
        </div>
        <div class="decision-detail" id="decision-detail" aria-live="polite"></div>
      </article>
    </section>
  </main>

  <script>
    window.__DASHBOARD_BASE__ = window.__DASHBOARD_BASE__ || "/dashboard";
  </script>
  <script defer src="./main.js"></script>
</body>
</html>
